name: CI Docs

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'rfcs/**'
      - '**/*.md'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'rfcs/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  lint-docs:
    name: Lint Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
