name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'rfcs/**'
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'rfcs/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=5m

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Unit Tests
        run: |
          set -o pipefail
          go test -v -json -race -coverprofile=unit.out -count=1 $(go list ./... | grep -v '/e2e') | tee test-output.json
      - name: Run E2E Tests
        run: |
          set -o pipefail
          E2E_COVERAGE_OUT=e2e_coverage.out go test -v -json -count=1 ./e2e/ | tee -a test-output.json
      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Go Tests (${{ matrix.os }})
          path: test-output.json
          reporter: golang-json
      - name: Coverage Summary
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=unit.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f e2e_coverage.out ]; then
            echo "### E2E Tests" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            go tool cover -func=e2e_coverage.out >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        if: matrix.os == 'ubuntu-latest'
        with:
          slug: Cloudstic/cli
          files: unit.out,e2e_coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  verify-platform-build-paths:
    name: Verify platform build paths (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: macOS
            os: macos-latest
            run: go test ./internal/secretref ./cmd/cloudstic
          - name: Windows
            os: windows-latest
            run: go test ./internal/secretref ./cmd/cloudstic
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run platform-specific verification
        run: ${{ matrix.run }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Build
        run: go build ./cmd/cloudstic
